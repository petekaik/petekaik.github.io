        <h1 style="font-size:2rem;margin-bottom:.5rem">Viikkoraha</h1>
        <p style="color:#555;font-size:1.1rem;margin-bottom:2rem">Lasten viikkorahaseuranta Google Sheetsillä — helppo tapa pitää kirjaa kotitöistä ja viikkorahoista koko perheen voimin.</p>

        <h2 style="font-size:1.3rem;margin:2rem 0 .5rem">Mikä Viikkoraha on?</h2>
        <p>Viikkoraha on ilmainen, selaimessa toimiva työkalu perheen kotitöiden seurantaan. Sovellus auttaa lapsia oppimaan vastuullisuutta ja rahankäyttöä — vanhemmat voivat määritellä askareita ja niiden arvon, ja lapset kirjaavat tehdyt työt. Vanhemmat hyväksyvät suoritukset ja viikkoraha kertyy automaattisesti.</p>

        <h2 style="font-size:1.3rem;margin:2rem 0 .5rem">Tietoturva</h2>
        <p>Kaikki data säilyy ainoastaan sinun omalla Google-tililläsi omissa Google Sheets -taulukoissasi. Sovellus ei kerää, tallenna tai välitä mitään tietoja ulkopuolisille palvelimille. Käyttäjänä sinulla on täysi hallinta datastasi.</p>
